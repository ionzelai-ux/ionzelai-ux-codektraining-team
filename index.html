<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CODEK · Equipo</title>
<meta name="theme-color" content="#0a0a0a">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a0a;color:#ededed;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.45;min-height:100vh}
header{background:#0d0d0d;border-bottom:1px solid #1f1f1f;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.brand{font-weight:900;letter-spacing:1px;color:#fff;font-size:16px}
.brand .accent{color:#B23A3A}
.brand-sub{font-size:10px;letter-spacing:3px;color:#888;margin-left:4px}
.hi{font-size:12px;color:#bbb}
.hi b{color:#fff;font-weight:700}
.logout{background:none;border:1px solid #2a2a2a;color:#999;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;margin-left:10px;font-family:inherit}
.logout:hover{border-color:#B23A3A;color:#fff}
main{max-width:680px;margin:0 auto;padding:18px 14px 60px}

/* ---- LOGIN ---- */
.login{max-width:340px;margin:60px auto 0;text-align:center;padding:0 16px}
.login h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:8px}
.login p{font-size:13px;color:#999;margin-bottom:28px}
.login input{width:100%;background:#141414;border:1.5px solid #2a2a2a;border-radius:10px;padding:14px 16px;color:#fff;font-size:18px;text-align:center;letter-spacing:3px;font-family:inherit;margin-bottom:14px}
.login input:focus{outline:none;border-color:#B23A3A;background:#1a1010}
.login button{width:100%;background:#B23A3A;border:none;color:#fff;font-size:15px;font-weight:700;padding:14px;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.5px}
.login button:hover{background:#c44848}
.login button:disabled{opacity:.5;cursor:default}
.login-err{color:#ff8888;font-size:13px;margin-top:10px;min-height:18px}

/* ---- BANDEJA ---- */
.bandeja-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.bandeja-head h2{font-size:17px;font-weight:800;color:#fff}
.btn-refresh{background:#141414;border:1px solid #2a2a2a;color:#bbb;font-size:12px;padding:7px 11px;border-radius:7px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-refresh:hover{border-color:#B23A3A;color:#fff}
.empty{padding:50px 20px;text-align:center;color:#777;background:#0f0f0f;border:1px dashed #2a2a2a;border-radius:10px}
.empty b{color:#bbb;display:block;margin-bottom:6px;font-size:15px}

.card{background:#121212;border:1px solid #1f1f1f;border-radius:12px;padding:14px;margin-bottom:11px;transition:border-color .12s}
.card:hover{border-color:#3a3a3a}
.card.con-parte{opacity:.55}
.card.rechazado{border-color:#7a3030;background:#1a0d0d}
.card-top{display:flex;gap:10px;align-items:flex-start}
.av{width:38px;height:38px;border-radius:50%;background:#B23A3A;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:3px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:#1f1f1f;color:#bbb}
.tag.interes{background:#1a0d10;color:#e89999}
.tag.proc{background:#10171f;color:#88aade}
.tag.parte-ok{background:#0f1f0f;color:#8bdc8b}
.tag.parte-rech{background:#3a1010;color:#ff9090}
.nota-jon{margin-top:10px;background:#1a1408;border-left:3px solid #BA7517;border-radius:6px;padding:8px 10px;font-size:13px;color:#e8d5a8}
.nota-jon b{color:#FAC775;font-weight:700;display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.nota-rech{margin-top:10px;background:#1f0f0f;border-left:3px solid #B23A3A;border-radius:6px;padding:8px 10px;font-size:13px;color:#ffb8b8}
.nota-rech b{color:#ff8080;font-weight:700;display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.card-actions{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-call{background:#1B7A3D;color:#fff;border:none;font-size:14px;font-weight:700;padding:11px;border-radius:8px;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-call:hover{background:#239848}
.btn-parte{background:#B23A3A;color:#fff;border:none;font-size:14px;font-weight:700;padding:11px;border-radius:8px;cursor:pointer;font-family:inherit}
.btn-parte:hover{background:#c44848}
.btn-parte.completado{background:#2a2a2a;color:#888;cursor:default}
.btn-reagendar{width:100%;background:#1a1a08;border:1.5px solid #BA7517;color:#FAC775;font-size:13px;font-weight:700;padding:9px;border-radius:8px;cursor:pointer;font-family:inherit}
.btn-reagendar:hover{background:#3a2a08;color:#fff}
.re-quick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.re-quick button{background:#1a1a08;border:1px solid #BA7517;color:#FAC775;font-size:12px;padding:6px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600}
.re-quick button:hover{background:#3a2a08;color:#fff}
.btn-detalle{background:none;border:none;color:#888;font-size:12px;margin-top:8px;cursor:pointer;font-family:inherit;text-decoration:underline}
.btn-detalle:hover{color:#fff}
.detalle{margin-top:10px;background:#0a0a0a;border:1px solid #1f1f1f;border-radius:8px;padding:10px;font-size:12px;color:#bbb;display:none;line-height:1.55}
.detalle.open{display:block}
.detalle .row{display:flex;gap:8px;padding:3px 0}
.detalle .row b{color:#999;min-width:88px;font-weight:600}
.detalle .row span{color:#ddd;word-break:break-word}
.detalle .historial{margin-top:8px;padding-top:8px;border-top:1px solid #1f1f1f;white-space:pre-wrap;color:#aaa;font-size:11.5px;max-height:200px;overflow-y:auto}
.estado-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;letter-spacing:.3px;display:inline-block}
.card-metrics{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;padding-top:10px;border-top:1px solid #1f1f1f}
.card-metrics .metric{flex:1;min-width:90px;background:#0a0a0a;border:1px solid #1f1f1f;border-radius:8px;padding:7px 10px;display:flex;flex-direction:column;gap:1px}
.card-metrics .metric-lbl{font-size:9.5px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.5px}
.card-metrics .metric-val{font-size:13px;font-weight:700;color:#fff}
.card-contacto{margin-top:8px;background:#0a0a0a;border:1px solid #1f1f1f;border-radius:8px;padding:8px 11px;font-size:12.5px}
.card-contacto .line{display:flex;gap:8px;padding:2px 0;color:#ddd}
.card-contacto .line b{color:#888;min-width:38px;font-weight:600;font-size:11px}
.card-contacto .line span{word-break:break-word}
.bloque-prox,.bloque-visita,.bloque-msg{margin-top:8px;border-radius:8px;padding:8px 11px;font-size:12.5px;line-height:1.5}
.bloque-prox{background:#0d0f1a;border-left:3px solid #534AB7;color:#cfcaf6}
.bloque-prox b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#AFA9EC;margin-bottom:2px}
.bloque-visita{background:#0a1310;border-left:3px solid #1D9E75;color:#9fe1cb}
.bloque-visita b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#5DCAA5;margin-bottom:2px}
.bloque-msg{background:#0f100a;border-left:3px solid #BA7517;color:#e8d5a8}
.bloque-msg b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#FAC775;margin-bottom:2px}
.historial-lead{margin-top:10px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:9px 11px;font-size:12px;color:#bbb}
.historial-lead b{display:block;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.historial-lead .hist-body{white-space:pre-wrap;line-height:1.5;color:#ddd;max-height:260px;overflow-y:auto;padding-right:4px}
.card{position:relative}
.btn-descartar{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;border:1px solid #2a2a2a;background:#1a1a1a;color:#888;font-size:13px;line-height:1;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;transition:background .12s,color .12s,border-color .12s;z-index:2}
.btn-descartar:hover{background:#5a1010;color:#fff;border-color:#B23A3A}
.grupo-tit{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin:22px 0 8px;padding:8px 12px;border-radius:8px;display:inline-block}
.grupo-atr{background:#3a1010;color:#ff9090;border:1px solid #B23A3A}
.grupo-hoy{background:#1a1a08;color:#FAC775;border:1px solid #BA7517}
.grupo-man{background:#0d0f1a;color:#AFA9EC;border:1px solid #534AB7}
.grupo-prox{background:#0a1310;color:#5DCAA5;border:1px solid #1D9E75}
.grupo-ok{background:#0f1f0f;color:#8bdc8b;border:1px solid #1B7A3D}
.grupo-badge{display:inline-block;font-size:10px;font-weight:700;background:#2a2a2a;color:#ccc;padding:2px 8px;border-radius:8px;margin-left:6px;vertical-align:middle;position:relative;top:-16px}
.fecha-llamada-chip{display:inline-block;font-size:10px;font-weight:800;padding:3px 9px;border-radius:8px;background:#0f0f0f;color:#ccc;border:1px solid #333;margin-top:4px}
.fecha-llamada-chip.atr{background:#3a1010;color:#ff9090;border-color:#B23A3A}
.fecha-llamada-chip.hoy{background:#1a1a08;color:#FAC775;border-color:#BA7517}
.fecha-llamada-chip.man{background:#0d0f1a;color:#AFA9EC;border-color:#534AB7}
/* Toolbar: buscador + calendario */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.buscador{flex:1;min-width:180px;position:relative}
.buscador .lupa{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#666;font-size:13px;pointer-events:none}
.buscador input{width:100%;background:#141414;border:1.5px solid #2a2a2a;border-radius:10px;padding:10px 34px 10px 32px;color:#fff;font-size:13.5px;font-family:inherit}
.buscador input:focus{outline:none;border-color:#B23A3A;background:#1a1010}
.clear-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:#2a2a2a;color:#ccc;border-radius:50%;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700}
.clear-x:hover{background:#B23A3A;color:#fff}
.btn-cal{background:#141414;border:1.5px solid #2a2a2a;color:#ccc;font-size:13px;padding:10px 14px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap}
.btn-cal:hover{border-color:#BA7517;color:#FAC775}
.btn-cal.on{background:#1a1a08;border-color:#BA7517;color:#FAC775}
/* Cabeceras de día con formato limpio */
.dia-head{margin:20px 0 10px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:0 4px}
.dia-head .weekday{font-size:11px;font-weight:800;letter-spacing:1.5px;color:#888;text-transform:uppercase}
.dia-head .fecha-num{font-size:22px;font-weight:900;color:#fff;line-height:1}
.dia-head .fecha-mes{font-size:12px;font-weight:700;color:#999;text-transform:uppercase}
.dia-head .num-leads{margin-left:auto;font-size:11px;font-weight:700;background:#2a2a2a;color:#ccc;padding:3px 9px;border-radius:10px}
.dia-head.hoy{background:linear-gradient(90deg,#3a1010,transparent);border-left:4px solid #B23A3A;padding-left:12px;border-radius:0 8px 8px 0}
.dia-head.hoy .weekday{color:#ff9090}
.dia-head.hoy .fecha-num,.dia-head.hoy .fecha-mes{color:#fff}
.dia-head.hoy .badge-hoy{background:#B23A3A;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;letter-spacing:1px}
.dia-head.atr{background:linear-gradient(90deg,#2a1010,transparent);border-left:4px solid #5a2020;padding-left:12px;border-radius:0 8px 8px 0}
.dia-head.atr .weekday{color:#ff8080}
.dia-head.man{border-left:4px solid #534AB7;padding-left:12px;border-radius:0 8px 8px 0}
.dia-head.man .weekday{color:#AFA9EC}
.dia-head.futuro{border-left:4px solid #1D9E75;padding-left:12px;border-radius:0 8px 8px 0}
.dia-head.futuro .weekday{color:#5DCAA5}
.dia-head.sin{border-left:4px solid #444;padding-left:12px;border-radius:0 8px 8px 0}
.dia-head.parte{border-left:4px solid #27500A;padding-left:12px;border-radius:0 8px 8px 0;opacity:.7}
/* Filtro activo (banner arriba cuando hay un día filtrado) */
.filtro-activo{background:#1a1a08;border:1px solid #BA7517;color:#FAC775;padding:10px 14px;border-radius:10px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px}
.filtro-activo b{color:#fff;font-weight:800}
.filtro-activo button{background:none;border:1px solid #BA7517;color:#FAC775;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:700}
.filtro-activo button:hover{background:#BA7517;color:#fff}
/* Mini calendario del modal filtro */
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
.mini-cal .mc-dow{font-size:10px;font-weight:700;color:#666;text-align:center;padding:6px 0;text-transform:uppercase;letter-spacing:.5px}
.mini-cal .mc-day{aspect-ratio:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:#ccc;font-family:inherit;padding:0;gap:1px;position:relative}
.mini-cal .mc-day:hover{background:#2a1010;border-color:#B23A3A}
.mini-cal .mc-day.otro-mes{opacity:.25}
.mini-cal .mc-day.hoy{background:#3a1010;border-color:#B23A3A;color:#fff;font-weight:800}
.mini-cal .mc-day.con-leads::after{content:'';width:5px;height:5px;background:#FAC775;border-radius:50%;position:absolute;bottom:5px}
.mini-cal .mc-day.sel{background:#BA7517;border-color:#BA7517;color:#fff;font-weight:800}
.mini-cal-nav{display:flex;align-items:center;justify-content:space-between;margin:8px 0 4px}
.mini-cal-nav button{background:#1a1a1a;border:1px solid #2a2a2a;color:#ccc;font-size:14px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
.mini-cal-nav button:hover{border-color:#B23A3A;color:#fff}
.mini-cal-nav .mes-txt{font-size:14px;font-weight:800;color:#fff}
.btn-reset{background:#2a1a1a;border-color:#5a1010;color:#ffb0b0}
.btn-reset:hover{background:#5a1010;border-color:#B23A3A;color:#fff}

/* ---- MODAL PARTE ---- */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:18px 14px;overflow-y:auto}
.modal-ov.open{display:flex}
.modal{background:#121212;border:1.5px solid #2a2a2a;border-radius:14px;width:100%;max-width:520px;color:#ededed;padding:18px;position:relative;margin-top:20px}
.modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border:none;background:#1a1a1a;color:#bbb;border-radius:50%;cursor:pointer;font-size:15px;font-weight:700}
.modal-close:hover{background:#B23A3A;color:#fff}
.modal h3{font-size:16px;font-weight:800;color:#fff;margin-bottom:4px;padding-right:30px}
.modal .sub-modal{font-size:12px;color:#888;margin-bottom:14px}
.modal label{display:block;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}
.modal input[type=text],.modal input[type=date],.modal input[type=time],.modal textarea,.modal select{
  width:100%;background:#0a0a0a;border:1.5px solid #2a2a2a;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit
}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:#B23A3A}
.modal textarea{min-height:70px;resize:vertical;line-height:1.45}
.modal .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal .res-btn{background:#0a0a0a;border:1.5px solid #2a2a2a;border-radius:8px;padding:14px 6px;color:#bbb;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.modal .res-btn:hover{border-color:#444;color:#fff}
.modal .res-btn.sel{background:#1a0d10;border-color:#B23A3A;color:#fff}
.modal .res-btn.sel-ok{background:#0f1f0f;border-color:#1B7A3D;color:#fff}
.fila-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fila-3{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bloque{background:#0a0a0a;border:1px dashed #2a2a2a;border-radius:8px;padding:10px;margin-top:10px}
.bloque .titulo{font-size:11px;font-weight:700;color:#FAC775;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#bbb;margin-top:6px;padding:8px;border-radius:6px;background:#0a0a0a;border:1px solid #1f1f1f}
.toggle input{accent-color:#B23A3A;width:18px;height:18px}
/* ---- TABS Y INFORME ---- */
.tab-btn{flex:1;background:none;border:none;color:#888;font-size:13px;font-weight:700;padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;transition:background .12s,color .12s}
.tab-btn:hover{color:#fff}
.tab-btn.tab-on{background:#B23A3A;color:#fff}
.periodo-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.per-btn{flex:1;min-width:80px;background:#141414;border:1px solid #2a2a2a;color:#bbb;font-size:12px;font-weight:600;padding:8px;border-radius:7px;cursor:pointer;font-family:inherit}
.per-btn:hover{border-color:#B23A3A;color:#fff}
.per-btn.per-on{background:#B23A3A;border-color:#B23A3A;color:#fff}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#121212;border:1px solid #1f1f1f;border-radius:10px;padding:14px 8px;text-align:center}
.stat-card.cogio{border-color:#1B7A3D}
.stat-card.nocogio{border-color:#A32D2D}
.stat-num{font-size:26px;font-weight:900;color:#fff;line-height:1}
.stat-card.cogio .stat-num{color:#5ac96e}
.stat-card.nocogio .stat-num{color:#ff7a7a}
.stat-lbl{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.7px;margin-top:5px}
.inf-card{background:#121212;border:1px solid #1f1f1f;border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.inf-card .inf-res{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;flex-shrink:0}
.inf-res.cogio{background:#0f1f0f;color:#8bdc8b}
.inf-res.no_cogio{background:#3a1010;color:#ff9090}
.inf-res.buzon,.inf-res.apagado{background:#1a1a1a;color:#bbb}
.inf-card .inf-info{flex:1;min-width:0}
.inf-card .inf-nombre{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.inf-card .inf-meta{font-size:11px;color:#888}
.inf-card .inf-nota{font-size:11px;color:#aaa;margin-top:4px;font-style:italic}
.btn-enviar{width:100%;background:#B23A3A;color:#fff;border:none;font-size:15px;font-weight:800;padding:14px;border-radius:9px;cursor:pointer;font-family:inherit;margin-top:18px;letter-spacing:.3px}
.btn-enviar:hover{background:#c44848}
.btn-enviar:disabled{opacity:.5;cursor:default}
.err{color:#ff8888;font-size:13px;margin-top:8px;text-align:center;min-height:18px}
.ok-msg{text-align:center;padding:40px 20px}
.ok-msg .check{font-size:60px;color:#5ac96e;line-height:1;margin-bottom:10px}
.ok-msg h3{font-size:20px;color:#fff;margin-bottom:6px;font-weight:800}
.ok-msg p{font-size:13px;color:#999}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:#B23A3A;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;color:#777;padding:50px 20px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="vLogin" class="login">
  <h1><span style="color:#B23A3A">CODEK</span> · Equipo</h1>
  <p>¿Quién eres?</p>
  <div id="loginBtns" style="display:flex;flex-direction:column;gap:12px"></div>
  <div class="login-err" id="loginErr"></div>
</div>

<!-- HEADER + BANDEJA -->
<header id="hdr" style="display:none">
  <div>
    <span class="brand"><span class="accent">CODEK</span><span class="brand-sub">EQUIPO</span></span>
  </div>
  <div>
    <span class="hi">Hola, <b id="hiNombre">—</b></span>
    <button class="logout" onclick="hacerLogout()">Salir</button>
  </div>
</header>

<main id="vMain" style="display:none">
  <div style="display:flex;gap:6px;margin-bottom:14px;padding:4px;background:#0f0f0f;border-radius:10px">
    <button id="tabBandeja" class="tab-btn tab-on" onclick="mostrarTab('bandeja')">📋 Mis leads</button>
    <button id="tabInforme" class="tab-btn" onclick="mostrarTab('informe')">📊 Mi informe</button>
  </div>

  <div id="viewBandeja">
    <div class="bandeja-head">
      <h2>Tus llamadas</h2>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-refresh" onclick="cargarLeads()">↻ Actualizar</button>
        <button class="btn-refresh btn-reset" onclick="resetTodos()" title="Descartar todos los leads pendientes">🗑 Vaciar todo</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="buscador">
        <span class="lupa">🔍</span>
        <input type="text" id="buscador" placeholder="Buscar por nombre o teléfono…" oninput="renderBandeja()">
        <button class="clear-x" id="clearX" onclick="limpiarBuscador()" style="display:none">✕</button>
      </div>
      <button class="btn-cal" id="btnCal" onclick="abrirCalendarioFiltro()">📅 Filtrar día</button>
    </div>
    <div id="filtroActivo" style="display:none"></div>
    <div id="bandeja"><div class="loading"><span class="spinner"></span>Cargando…</div></div>
  </div>

  <!-- Modal mini-calendario para filtrar por día -->
  <div class="modal-ov" id="modalCalFiltro">
    <div class="modal" style="max-width:340px">
      <button class="modal-close" onclick="cerrarCalendarioFiltro()">×</button>
      <h3>Elige un día</h3>
      <p class="sub-modal">Solo se mostrarán los leads asignados a ese día.</p>
      <div id="miniCalBody"></div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn-enviar" onclick="quitarFiltroDia()" style="background:#2a2a2a;color:#bbb">Ver todos los días</button>
      </div>
    </div>
  </div>

  <div id="viewInforme" style="display:none">
    <div class="bandeja-head">
      <h2>Mi informe</h2>
      <button class="btn-refresh" onclick="cargarInforme()">↻ Actualizar</button>
    </div>
    <div class="periodo-btns" id="periodoBtns">
      <button class="per-btn per-on" data-per="hoy" onclick="elegirPeriodo('hoy')">Hoy</button>
      <button class="per-btn" data-per="ayer" onclick="elegirPeriodo('ayer')">Ayer</button>
      <button class="per-btn" data-per="semana" onclick="elegirPeriodo('semana')">Esta semana</button>
      <button class="per-btn" data-per="mes" onclick="elegirPeriodo('mes')">Este mes</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stTotal">0</div><div class="stat-lbl">Llamadas</div></div>
      <div class="stat-card cogio"><div class="stat-num" id="stCogio">0</div><div class="stat-lbl">Cogieron</div></div>
      <div class="stat-card nocogio"><div class="stat-num" id="stNoCogio">0</div><div class="stat-lbl">No cogieron</div></div>
    </div>
    <div id="informeList"><div class="loading"><span class="spinner"></span>Cargando…</div></div>
  </div>
</main>

<!-- MODAL PARTE -->
<div class="modal-ov" id="modalParte">
  <div class="modal" id="modalParteBox">
    <button class="modal-close" onclick="cerrarParte()">×</button>
    <div id="modalParteBody"></div>
  </div>
</div>

<!-- MODAL REAGENDAR -->
<div class="modal-ov" id="modalReagendar">
  <div class="modal" style="max-width:400px">
    <button class="modal-close" onclick="cerrarReagendar()">×</button>
    <h3>📅 Reagendar llamada</h3>
    <p class="sub-modal" id="reagSub"></p>
    <label>Nueva fecha para llamar</label>
    <input type="date" id="reagFecha">
    <div class="re-quick">
      <button type="button" onclick="reagRapida(1)">Mañana</button>
      <button type="button" onclick="reagRapida(2)">En 2 días</button>
      <button type="button" onclick="reagRapida(3)">En 3 días</button>
      <button type="button" onclick="reagRapida(7)">En 1 semana</button>
    </div>
    <label>Nota corta (opcional)</label>
    <input type="text" id="reagNota" placeholder="Ej: llamar a las 15h, dijo que a esa hora sí puede">
    <div class="err" id="reagErr"></div>
    <button class="btn-enviar" onclick="confirmarReagendar()" style="margin-top:14px">Confirmar reagendado</button>
  </div>
</div>

<script>
var SYNC_URL='https://script.google.com/macros/s/AKfycbxLrYar_Enx5Uk49uXtxi0ok87eFZaNGuMYllbAx0KlFNu8A6kaFJFUAHm1hiJ2r4SxRg/exec';
var TOKEN='codek-9fK2mP7qX4';
var SESSION = null;
var LEADS = [];

// ---- Persistencia sesión ----
function saveSession(s){try{localStorage.setItem('codek_team',JSON.stringify(s));}catch(e){}}
function loadSession(){try{var v=localStorage.getItem('codek_team');return v?JSON.parse(v):null;}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem('codek_team');}catch(e){}}

// ---- JSONP helper ----
function jsonp(params, cb){
  var name = '_cb_'+Date.now()+Math.floor(Math.random()*10000);
  var done=false;
  var script=document.createElement('script');
  window[name] = function(resp){
    if(done)return;done=true;
    try{delete window[name];}catch(e){window[name]=null;}
    if(script.parentNode)script.parentNode.removeChild(script);
    cb(resp);
  };
  var url = SYNC_URL+'?token='+encodeURIComponent(TOKEN);
  Object.keys(params).forEach(function(k){
    url += '&'+k+'='+encodeURIComponent(params[k]);
  });
  url += '&callback='+name;
  script.src = url;
  script.onerror = function(){if(!done){done=true;cb({ok:false,error:'red'});}};
  document.body.appendChild(script);
  setTimeout(function(){if(!done){done=true;cb({ok:false,error:'timeout'});}},15000);
}

// ---- LOGIN sin PIN: botones con los entrenadores ----
function cargarBotonesLogin(){
  var cont = document.getElementById('loginBtns');
  if(!cont) return;
  cont.innerHTML = '<div style="font-size:12px;color:#777">Cargando…</div>';
  jsonp({action:'entrenadores'}, function(r){
    var ents = (r && r.ok && r.entrenadores) ? r.entrenadores : [];
    if(!ents.length){
      cont.innerHTML = '<div class="login-err">No hay entrenadores configurados. Avisa a Jon.</div>';
      return;
    }
    cont.innerHTML = '';
    ents.forEach(function(e){
      var b = document.createElement('button');
      b.type='button';
      b.textContent = 'Soy ' + e.nombre;
      b.onclick = function(){ entrarComo(e); };
      cont.appendChild(b);
    });
  });
}
function entrarComo(ent){
  SESSION = {id:ent.id, nombre:ent.nombre};
  saveSession(SESSION);
  mostrarBandeja();
  // Pinta caché al instante. Solo llama al backend si no había nada guardado.
  var cache = _cacheLeer();
  if(cache && cache.leads && cache.leads.length){
    LEADS = cache.leads;
    renderBandeja();
  } else {
    cargarLeads();
  }
}

function hacerLogout(){
  clearSession();
  SESSION = null;
  LEADS = [];
  document.getElementById('vMain').style.display='none';
  document.getElementById('hdr').style.display='none';
  document.getElementById('vLogin').style.display='block';
  cargarBotonesLogin();
}

function mostrarBandeja(){
  document.getElementById('vLogin').style.display='none';
  document.getElementById('hdr').style.display='flex';
  document.getElementById('vMain').style.display='block';
  document.getElementById('hiNombre').textContent = SESSION.nombre;
}

// ---- CARGAR LEADS ASIGNADOS ----
var LAST_FETCH_TS = 0;
var _LEADS_CACHE_KEY = 'codek_team_leads_cache';
function _cacheGuardar(){
  if(!SESSION) return;
  try{
    localStorage.setItem(_LEADS_CACHE_KEY+'_'+SESSION.id, JSON.stringify({ts:Date.now(), leads:LEADS}));
  }catch(e){}
}
function _cacheLeer(){
  if(!SESSION) return null;
  try{
    var v = localStorage.getItem(_LEADS_CACHE_KEY+'_'+SESSION.id);
    return v ? JSON.parse(v) : null;
  }catch(e){ return null; }
}

// silencioso=true => refresca en background sin cambiar la UI mientras espera
function cargarLeads(silencioso){
  if(!SESSION) return;
  var b = document.getElementById('bandeja');
  // Si no tenemos NADA para pintar todavía, muestra el spinner. Si ya hay algo,
  // no lo tocamos y refrescamos por debajo.
  if(!silencioso && !LEADS.length){
    b.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando…</div>';
  }
  jsonp({action:'mis_leads', id_entrenador:SESSION.id, pin:SESSION.pin||''}, function(r){
    LAST_FETCH_TS = Date.now();
    if(!r || !r.ok){
      if(r && r.error==='pin'){ hacerLogout(); return; }
      // Solo mostramos error si no había nada previo. Si había cache, dejamos lo cacheado.
      if(!LEADS.length){
        b.innerHTML = '<div class="empty"><b>No se ha podido cargar.</b>Reintenta en un momento o pulsa Salir y vuelve a entrar.</div>';
      }
      return;
    }
    LEADS = r.leads || [];
    _cacheGuardar();
    renderBandeja();
  });
}

function iniciales(s){ if(!s) return '?'; var p=s.trim().split(/\\s+/); return ((p[0]||'').charAt(0)+(p[1]||'').charAt(0)).toUpperCase()||'?'; }

function descartarLead(idAsig, nombre){
  if(!SESSION) return;
  if(!confirm('¿Descartar a "'+nombre+'" de tu bandeja?\n\nEl lead NO se borra del CRM, solo desaparece de tu lista. Jon lo puede reasignar más tarde si quiere.')) return;
  // Actualización local inmediata (no bloquea al usuario)
  LEADS = LEADS.filter(function(x){return x.id_asignacion !== idAsig;});
  _cacheGuardar();
  renderBandeja();
  // Aviso al backend en segundo plano
  jsonp({action:'descartar_asignacion', id_asignacion:idAsig, id_entrenador:SESSION.id}, function(r){
    if(!(r && r.ok)) alert('Aviso: no se pudo confirmar en el servidor: '+((r&&r.error)||'error desconocido'));
  });
}

// ==================== REAGENDAR ====================
var _REAG_ID = null;
function abrirReagendar(idAsig){
  var L = LEADS.filter(function(x){return x.id_asignacion===idAsig;})[0];
  if(!L) return;
  _REAG_ID = idAsig;
  document.getElementById('reagSub').textContent = (L.nombre||L.tel||'lead');
  // Fecha por defecto: mañana
  document.getElementById('reagFecha').value = _sumarDiasISO(_hoyISOTeam(), 1);
  document.getElementById('reagNota').value = '';
  document.getElementById('reagErr').textContent = '';
  document.getElementById('modalReagendar').classList.add('open');
}
function cerrarReagendar(){ document.getElementById('modalReagendar').classList.remove('open'); _REAG_ID = null; }
function reagRapida(dias){
  document.getElementById('reagFecha').value = _sumarDiasISO(_hoyISOTeam(), dias);
}
function confirmarReagendar(){
  if(!_REAG_ID || !SESSION) return;
  var fecha = document.getElementById('reagFecha').value;
  var nota = document.getElementById('reagNota').value.trim();
  var err = document.getElementById('reagErr');
  if(!fecha){ err.textContent='Elige una fecha.'; return; }
  err.textContent='';
  // Actualización local inmediata
  var idAsig = _REAG_ID;
  LEADS.forEach(function(L){
    if(L.id_asignacion === idAsig){ L.fecha_llamada = fecha; }
  });
  _cacheGuardar();
  cerrarReagendar();
  renderBandeja();
  // Sync al backend en segundo plano
  jsonp({action:'reagendar_asignacion', id_asignacion:idAsig, id_entrenador:SESSION.id, fecha_llamada:fecha, nota_extra:nota}, function(r){
    if(!(r && r.ok)) alert('Aviso: no se pudo confirmar en el servidor: '+((r&&r.error)||'error desconocido'));
  });
}

function resetTodos(){
  if(!SESSION) return;
  var pendientes = LEADS.filter(function(l){return !l.con_parte || l.parte_estado==='rechazado';}).length;
  if(!pendientes){ alert('No tienes leads pendientes que vaciar.'); return; }
  if(!confirm('¿Vaciar TODA tu bandeja?\n\nSe descartarán '+pendientes+' leads pendientes (los que ya tienen parte enviado no se tocan).\n\nLos leads NO se borran del CRM, solo desaparecen de tu lista. Esta acción no se puede deshacer desde la app.')) return;
  // Actualización local inmediata: quitamos todos los pendientes
  LEADS = LEADS.filter(function(l){return l.con_parte && l.parte_estado!=='rechazado';});
  _cacheGuardar();
  renderBandeja();
  jsonp({action:'descartar_todas', id_entrenador:SESSION.id}, function(r){
    if(r && r.ok){
      // Nada más que hacer, la lista ya se actualizó localmente
    } else {
      alert('Aviso: no se pudo confirmar en el servidor: '+((r&&r.error)||'error desconocido'));
    }
  });
}

// ---- TABS y INFORME ----
var TAB_ACTUAL = 'bandeja';
var INFORME_PERIODO = 'hoy';
function mostrarTab(t){
  TAB_ACTUAL = t;
  document.getElementById('tabBandeja').classList.toggle('tab-on', t==='bandeja');
  document.getElementById('tabInforme').classList.toggle('tab-on', t==='informe');
  document.getElementById('viewBandeja').style.display = t==='bandeja' ? 'block' : 'none';
  document.getElementById('viewInforme').style.display = t==='informe' ? 'block' : 'none';
  if(t==='informe') cargarInforme();
}
function rangoPeriodo(per){
  // Devuelve {desde, hasta} en yyyy-mm-dd (zona local del navegador)
  function fmt(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  if(per==='hoy') return {desde:fmt(hoy), hasta:fmt(hoy)};
  if(per==='ayer'){var a=new Date(hoy);a.setDate(a.getDate()-1);return {desde:fmt(a), hasta:fmt(a)};}
  if(per==='semana'){
    var dia = hoy.getDay() || 7; // domingo=0 -> lo tratamos como 7
    var lun = new Date(hoy); lun.setDate(hoy.getDate()-(dia-1));
    return {desde:fmt(lun), hasta:fmt(hoy)};
  }
  if(per==='mes'){
    var primero = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
    return {desde:fmt(primero), hasta:fmt(hoy)};
  }
  return {desde:'', hasta:''};
}
function elegirPeriodo(per){
  INFORME_PERIODO = per;
  document.querySelectorAll('.per-btn').forEach(function(b){
    b.classList.toggle('per-on', b.dataset.per===per);
  });
  cargarInforme();
}
function cargarInforme(){
  if(!SESSION) return;
  var lista = document.getElementById('informeList');
  lista.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando…</div>';
  var r = rangoPeriodo(INFORME_PERIODO);
  jsonp({action:'informe_entrenador', id_entrenador:SESSION.id, desde:r.desde, hasta:r.hasta}, function(resp){
    if(!resp || !resp.ok){ lista.innerHTML='<div class="empty">No se pudo cargar el informe.</div>'; return; }
    var st = resp.stats||{total:0,cogio:0,no_cogio:0,buzon:0,apagado:0};
    document.getElementById('stTotal').textContent = st.total;
    document.getElementById('stCogio').textContent = st.cogio;
    document.getElementById('stNoCogio').textContent = (st.no_cogio+st.buzon+st.apagado);
    var partes = resp.partes||[];
    if(!partes.length){ lista.innerHTML='<div class="empty"><b>Sin llamadas</b>No hay partes en este periodo.</div>'; return; }
    var resLbl = {cogio:'✓ Cogió', no_cogio:'✗ No cogió', buzon:'📭 Buzón', apagado:'📴 Apagado'};
    var html = '';
    partes.forEach(function(p){
      var hora = (p.creadoEn||'').substring(11,16) || '';
      var fecha = (p.creadoEn||'').substring(0,10) || '';
      html += '<div class="inf-card">'+
        '<div class="inf-res '+escapeHtml(p.resultado)+'">'+escapeHtml(resLbl[p.resultado]||p.resultado)+'</div>'+
        '<div class="inf-info">'+
          '<div class="inf-nombre">'+escapeHtml(p.lead_nombre)+'</div>'+
          '<div class="inf-meta">'+fecha+' '+hora+(p.lead_tel?' · '+escapeHtml(p.lead_tel):'')+'</div>'+
          (p.nota_entrenador?'<div class="inf-nota">'+escapeHtml(p.nota_entrenador)+'</div>':'')+
        '</div>'+
      '</div>';
    });
    lista.innerHTML = html;
  });
}

function _hoyISOTeam(){
  var d=new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
function _sumarDiasISO(iso,n){
  var p=iso.split('-'); var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
var _DIAS = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
var _MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
var _MESES_LARGOS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function _cabeceraDia(iso, hoy, count){
  var p = iso.split('-');
  var d = new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  var weekday = _DIAS[d.getDay()];
  var num = d.getDate();
  var mes = _MESES[d.getMonth()];
  var cls = 'dia-head';
  var extra = '';
  if(iso === hoy){ cls += ' hoy'; extra = '<span class="badge-hoy">HOY</span>'; }
  else if(iso < hoy){ cls += ' atr'; extra = '<span class="badge-hoy" style="background:#5a2020">ATRASADO</span>'; }
  else if(iso === _sumarDiasISO(hoy,1)){ cls += ' man'; extra = '<span style="font-size:10px;font-weight:800;color:#AFA9EC;letter-spacing:1px">MAÑANA</span>'; }
  else { cls += ' futuro'; }
  return '<div class="'+cls+'">'+
    '<span class="weekday">'+weekday+'</span>'+
    '<span class="fecha-num">'+num+'</span>'+
    '<span class="fecha-mes">'+mes+'</span>'+
    extra+
    '<span class="num-leads">'+count+' lead'+(count!==1?'s':'')+'</span>'+
  '</div>';
}

// Estado del filtro por día (null = sin filtro)
var FILTRO_DIA = null;

function limpiarBuscador(){ document.getElementById('buscador').value=''; renderBandeja(); }

function _filtrarPorBuscador(L, q){
  if(!q) return true;
  var qq = q.toLowerCase();
  return (L.nombre||'').toLowerCase().indexOf(qq)>=0
      || (L.tel||'').replace(/\\s/g,'').indexOf(qq.replace(/\\s/g,''))>=0;
}

function renderBandeja(){
  var b = document.getElementById('bandeja');
  var filtroBanner = document.getElementById('filtroActivo');
  if(!LEADS.length){
    b.innerHTML = '<div class="empty"><b>¡Sin leads asignados!</b>Cuando Jon te asigne llamadas, aparecerán aquí.</div>';
    if(filtroBanner) filtroBanner.style.display='none';
    return;
  }
  var q = (document.getElementById('buscador').value || '').trim();
  var clearBtn = document.getElementById('clearX');
  if(clearBtn) clearBtn.style.display = q ? 'block' : 'none';

  // Aplicar buscador
  var pendientes = LEADS
    .filter(function(l){return !l.con_parte || l.parte_estado==='rechazado';})
    .filter(function(L){return _filtrarPorBuscador(L, q);});
  var hechos = LEADS
    .filter(function(l){return l.con_parte && l.parte_estado!=='rechazado';})
    .filter(function(L){return _filtrarPorBuscador(L, q);});

  var hoy = _hoyISOTeam();

  // Aplicar filtro por día si está activo
  if(FILTRO_DIA){
    pendientes = pendientes.filter(function(L){return (L.fecha_llamada||'').slice(0,10) === FILTRO_DIA;});
    hechos = hechos.filter(function(L){return (L.fecha_llamada||'').slice(0,10) === FILTRO_DIA;});
    // Banner del filtro activo
    if(filtroBanner){
      var p = FILTRO_DIA.split('-');
      var d = new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
      filtroBanner.className = 'filtro-activo';
      filtroBanner.innerHTML = '<span>Filtrando por: <b>'+_DIAS[d.getDay()]+' '+d.getDate()+' '+_MESES[d.getMonth()]+'</b></span>'+
        '<button onclick="quitarFiltroDia()">✕ Quitar filtro</button>';
      filtroBanner.style.display='flex';
    }
  } else {
    if(filtroBanner){ filtroBanner.style.display='none'; filtroBanner.innerHTML=''; }
  }

  // Agrupar por día exacto
  var mapa = {}; // {iso: [leads]}
  var sinFecha = [];
  pendientes.forEach(function(L){
    var f = (L.fecha_llamada||'').slice(0,10);
    if(!f) sinFecha.push(L);
    else { if(!mapa[f]) mapa[f]=[]; mapa[f].push(L); }
  });

  // Ordenar días. Atrasados primero (más antiguos arriba), luego hoy, luego futuro.
  var dias = Object.keys(mapa).sort();

  var h = '';
  var vacio = !dias.length && !sinFecha.length && !hechos.length;
  if(vacio){
    if(q || FILTRO_DIA){
      h = '<div class="empty"><b>Nada coincide con el filtro</b>'+
          (q?'Prueba con otro texto en el buscador.':'')+
          (FILTRO_DIA?'<br>No tienes leads asignados a ese día.':'')+
          '</div>';
    } else {
      h = '<div class="empty"><b>¡Sin leads asignados!</b>Cuando Jon te asigne llamadas, aparecerán aquí.</div>';
    }
    b.innerHTML = h;
    return;
  }

  dias.forEach(function(iso){
    var arr = mapa[iso];
    // Ordenar dentro del día por hora si algún lead trajera hora (no la tenemos, dejamos por nombre)
    arr.sort(function(a,bb){ return (a.nombre||'').localeCompare(bb.nombre||''); });
    h += _cabeceraDia(iso, hoy, arr.length);
    arr.forEach(function(L){ h += tarjeta(L); });
  });

  if(sinFecha.length){
    h += '<div class="dia-head sin"><span class="weekday">SIN FECHA</span><span class="num-leads">'+sinFecha.length+' lead'+(sinFecha.length!==1?'s':'')+'</span></div>';
    sinFecha.sort(function(a,bb){ return (a.nombre||'').localeCompare(bb.nombre||''); });
    sinFecha.forEach(function(L){ h += tarjeta(L); });
  }

  if(hechos.length){
    h += '<div class="dia-head parte"><span class="weekday">✓ CON PARTE ENVIADO</span><span class="num-leads">'+hechos.length+'</span></div>';
    hechos.forEach(function(L){ h += tarjeta(L); });
  }
  b.innerHTML = h;
}

// ==================== FILTRO POR DÍA (mini calendario) ====================
var _CAL_MES = null; // {y, m} en visualización actual
function abrirCalendarioFiltro(){
  var hoy = new Date();
  _CAL_MES = _CAL_MES || { y: hoy.getFullYear(), m: hoy.getMonth() };
  pintarMiniCal();
  document.getElementById('modalCalFiltro').classList.add('open');
}
function cerrarCalendarioFiltro(){ document.getElementById('modalCalFiltro').classList.remove('open'); }
function pintarMiniCal(){
  var body = document.getElementById('miniCalBody');
  var y = _CAL_MES.y, m = _CAL_MES.m;
  var primDia = new Date(y, m, 1);
  var pDow = primDia.getDay(); // 0=dom
  var offset = pDow===0 ? 6 : pDow-1; // empezamos en Lun
  var diasMes = new Date(y, m+1, 0).getDate();
  var hoyISO = _hoyISOTeam();

  // Contar leads por día
  var counts = {};
  LEADS.filter(function(l){return !l.con_parte || l.parte_estado==='rechazado';}).forEach(function(L){
    var f = (L.fecha_llamada||'').slice(0,10);
    if(f) counts[f] = (counts[f]||0)+1;
  });

  var h = '<div class="mini-cal-nav">'+
    '<button onclick="navCal(-1)">‹</button>'+
    '<span class="mes-txt">'+_MESES_LARGOS[m]+' '+y+'</span>'+
    '<button onclick="navCal(1)">›</button>'+
  '</div><div class="mini-cal">';
  ['L','M','X','J','V','S','D'].forEach(function(d){ h += '<div class="mc-dow">'+d+'</div>'; });
  for(var i=0;i<offset;i++) h += '<div></div>';
  for(var d=1; d<=diasMes; d++){
    var iso = y+'-'+('0'+(m+1)).slice(-2)+'-'+('0'+d).slice(-2);
    var cls = 'mc-day';
    if(iso === hoyISO) cls += ' hoy';
    if(counts[iso]) cls += ' con-leads';
    if(iso === FILTRO_DIA) cls += ' sel';
    var count = counts[iso] ? '<span style="font-size:8.5px;color:#FAC775">'+counts[iso]+'</span>' : '';
    h += '<button class="'+cls+'" onclick="filtrarPorDia(\''+iso+'\')">'+d+count+'</button>';
  }
  h += '</div>';
  body.innerHTML = h;
}
function navCal(delta){
  _CAL_MES.m += delta;
  if(_CAL_MES.m < 0){ _CAL_MES.m=11; _CAL_MES.y--; }
  if(_CAL_MES.m > 11){ _CAL_MES.m=0; _CAL_MES.y++; }
  pintarMiniCal();
}
function filtrarPorDia(iso){
  FILTRO_DIA = iso;
  var btn = document.getElementById('btnCal');
  if(btn) btn.classList.add('on');
  cerrarCalendarioFiltro();
  renderBandeja();
}
function quitarFiltroDia(){
  FILTRO_DIA = null;
  var btn = document.getElementById('btnCal');
  if(btn) btn.classList.remove('on');
  cerrarCalendarioFiltro();
  renderBandeja();
}

function _estadoBadge(estado){
  var defs = {
    'E0':{txt:'E0 · Nuevo lead', bg:'#3C3489', col:'#fff'},
    'E1':{txt:'E1 · Contactado', bg:'#7E1F2D', col:'#fff'},
    'E2':{txt:'E2 · Interés WAS', bg:'#27500A', col:'#fff'},
    'E3':{txt:'E3 · No contesta', bg:'#444441', col:'#fff'},
    'E4':{txt:'E4 · Quiere reservar', bg:'#BA7517', col:'#fff'},
    'E5':{txt:'E5 · Reserva confirmada', bg:'#854F0B', col:'#fff'},
    'E5.1':{txt:'E5.1 · Reagendar', bg:'#72243E', col:'#fff'},
    'E6':{txt:'E6 · Ha visitado', bg:'#085041', col:'#fff'},
    'E7':{txt:'E7 · Quiere contratar', bg:'#3C3489', col:'#fff'},
    'E8':{txt:'E8 · Cliente', bg:'#3B6D11', col:'#fff'},
    'E9':{txt:'E9 · Basura', bg:'#791F1F', col:'#fff'},
    'ANT':{txt:'Antiguo · revisar', bg:'#2C2C2A', col:'#D3D1C7'}
  };
  var d = defs[estado] || {txt:estado, bg:'#444', col:'#fff'};
  return '<span class="estado-badge" style="background:'+d.bg+';color:'+d.col+'">'+escapeHtml(d.txt)+'</span>';
}

function _fmtFecha(iso){
  if(!iso) return '';
  var s = String(iso).slice(0,10).split('-');
  if(s.length<3) return iso;
  return s[2]+'/'+s[1];
}

function _diasDesde(iso){
  if(!iso) return null;
  var d = new Date(iso); if(isNaN(d)) return null;
  function fmt(x){return x.getFullYear()+'-'+('0'+(x.getMonth()+1)).slice(-2)+'-'+('0'+x.getDate()).slice(-2);}
  function aTs(s){var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).getTime();}
  return Math.round((aTs(fmt(new Date())) - aTs(fmt(d))) / 86400000);
}

function tarjeta(L){
  var clase = 'card';
  if(L.con_parte && L.parte_estado==='pendiente') clase += ' con-parte';
  if(L.parte_estado==='rechazado') clase += ' rechazado';

  // ---- Tags superiores (estado + procedencia + interés + estado del parte) ----
  var tags = '';
  if(L.estado) tags += _estadoBadge(L.estado);
  if(L.interes) tags += '<span class="tag interes">'+escapeHtml(L.interes)+'</span>';
  if(L.procedencia) tags += '<span class="tag proc">'+escapeHtml(L.procedencia)+'</span>';
  if(L.con_parte && L.parte_estado==='pendiente') tags += '<span class="tag parte-ok">Parte enviado · Pendiente</span>';
  if(L.parte_estado==='rechazado') tags += '<span class="tag parte-rech">⚠ Rechazado · corrige</span>';

  // Chip de fecha de llamada destacado
  if(L.fecha_llamada){
    var fll = (L.fecha_llamada||'').slice(0,10);
    var hoyT = _hoyISOTeam();
    var manT = _sumarDiasISO(hoyT, 1);
    var chipCls = fll<hoyT?'atr':(fll===hoyT?'hoy':(fll===manT?'man':''));
    var chipTxt = fll<hoyT?'📞 ATRASADO desde '+_fmtFecha(fll)
                   :(fll===hoyT?'📞 Llamar HOY'
                   :(fll===manT?'📞 Llamar mañana ('+_fmtFecha(fll)+')'
                   :'📞 Llamar el '+_fmtFecha(fll)));
    tags += '<span class="fecha-llamada-chip '+chipCls+'">'+chipTxt+'</span>';
  }

  // ---- Métricas clave ----
  var metricas = '<div class="card-metrics">';
  var llam = (typeof L.llamadas_hechas==='number'?L.llamadas_hechas:0);
  var llamCol = llam>=2?'#ff8a8a':(llam>=1?'#FAC775':'#888');
  metricas += '<div class="metric"><span class="metric-lbl">Llamadas hechas</span><span class="metric-val" style="color:'+llamCol+'">'+llam+'</span></div>';
  if(L.fecha_gestion){
    var dd = _diasDesde(L.fecha_gestion);
    var txt = dd===0?'hoy':(dd===1?'ayer':'hace '+dd+' días');
    metricas += '<div class="metric"><span class="metric-lbl">Entró</span><span class="metric-val">'+_fmtFecha(L.fecha_gestion)+' · '+txt+'</span></div>';
  }
  if(L.ultimo_contacto){
    metricas += '<div class="metric"><span class="metric-lbl">Último contacto</span><span class="metric-val">'+_fmtFecha(L.ultimo_contacto)+'</span></div>';
  }
  metricas += '</div>';

  // ---- Datos de contacto ----
  var contacto = '<div class="card-contacto">';
  if(L.tel) contacto += '<div class="line"><b>Tel.</b> <span>'+escapeHtml(L.tel)+'</span></div>';
  if(L.mail) contacto += '<div class="line"><b>Mail</b> <span>'+escapeHtml(L.mail)+'</span></div>';
  contacto += '</div>';

  // ---- Próximo contacto agendado (si lo hay) ----
  var proximo = '';
  if(L.prox_fecha){
    var tipo = L.prox_tipo==='mensaje'?'💬 Mensaje':'📞 Llamada';
    var hora = L.prox_hora ? (' · '+L.prox_hora) : (L.prox_franja==='tarde'?' · Tarde':' · Mañana');
    proximo = '<div class="bloque-prox"><b>📅 Próximo contacto agendado</b>'+tipo+' · '+_fmtFecha(L.prox_fecha)+hora+(L.prox_nota?' — '+escapeHtml(L.prox_nota):'')+'</div>';
  }
  if(L.fecha_visita){
    var hv = L.hora_visita ? (' a las '+L.hora_visita+'h') : '';
    proximo += '<div class="bloque-visita"><b>🏠 Visita reservada</b>'+_fmtFecha(L.fecha_visita)+hv+'</div>';
  }
  if(L.mensaje_enviado_en){
    proximo += '<div class="bloque-msg"><b>📤 Mensaje enviado el</b>'+_fmtFecha(L.mensaje_enviado_en)+'</div>';
  }

  // ---- Notas ----
  var notaJon = L.nota_jon ? '<div class="nota-jon"><b>📌 Nota de Jon (asignación)</b>'+escapeHtml(L.nota_jon)+'</div>' : '';
  var notaRech = (L.parte_estado==='rechazado' && L.parte_rechazo) ? '<div class="nota-rech"><b>Motivo del rechazo</b>'+escapeHtml(L.parte_rechazo)+'</div>' : '';
  var historial = L.nota_lead ? '<div class="historial-lead"><b>📜 Historial del lead</b><div class="hist-body">'+escapeHtml(L.nota_lead)+'</div></div>' : '';

  // ---- Acciones ----
  var telLink = L.tel ? '<a class="btn-call" href="tel:'+encodeURIComponent(L.tel)+'">📞 Llamar</a>' : '<button class="btn-call" disabled style="opacity:.4">Sin tel.</button>';
  var btnParte;
  if(L.con_parte && L.parte_estado==='pendiente'){
    btnParte = '<button class="btn-parte completado" disabled>✓ Parte enviado</button>';
  } else if(L.parte_estado==='rechazado'){
    btnParte = '<button class="btn-parte" onclick="abrirParte(\''+L.id_asignacion+'\')">Corregir parte</button>';
  } else {
    btnParte = '<button class="btn-parte" onclick="abrirParte(\''+L.id_asignacion+'\')">📝 Hacer parte</button>';
  }

  var btnDescartar = '<button class="btn-descartar" title="Descartar este lead (quitarlo de tu bandeja)" onclick="descartarLead(\''+L.id_asignacion+'\',\''+escapeHtml((L.nombre||L.tel||'este lead').replace(/\'/g,''))+'\')">✕</button>';

  var btnReagendar = '<button class="btn-reagendar" onclick="abrirReagendar(\''+L.id_asignacion+'\')">📅 Reagendar</button>';

  return '<div class="'+clase+'">'+
    btnDescartar +
    '<div class="card-top">'+
      '<div class="av">'+iniciales(L.nombre||L.tel)+'</div>'+
      '<div class="card-info">'+
        '<div class="card-name">'+escapeHtml(L.nombre||'(sin nombre)')+'</div>'+
        '<div class="card-tags">'+tags+'</div>'+
      '</div>'+
    '</div>'+
    metricas + contacto + proximo + notaJon + notaRech + historial +
    '<div class="card-actions">'+telLink+btnParte+'</div>'+
    '<div style="margin-top:6px">'+btnReagendar+'</div>'+
  '</div>';
}

function escapeHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ---- DETALLE ----
function toggleDetalle(idAsig){
  var L = LEADS.filter(function(x){return x.id_asignacion===idAsig;})[0];
  if(!L) return;
  var d = document.getElementById('det_'+idAsig);
  if(d.classList.contains('open')){ d.classList.remove('open'); return; }
  d.classList.add('open');
  if(d.dataset.loaded==='1') return;
  jsonp({action:'detalle_lead', id:L.id_lead, id_entrenador:SESSION.id}, function(r){
    if(!r || !r.ok){ d.innerHTML='<i>No se pudo cargar el detalle.</i>'; return; }
    var L2 = r.lead;
    var rows = '';
    if(L2.tel) rows += '<div class="row"><b>Teléfono</b><span>'+escapeHtml(L2.tel)+'</span></div>';
    if(L2.mail) rows += '<div class="row"><b>Email</b><span>'+escapeHtml(L2.mail)+'</span></div>';
    if(L2.interes) rows += '<div class="row"><b>Interés</b><span>'+escapeHtml(L2.interes)+'</span></div>';
    if(L2.procedencia) rows += '<div class="row"><b>Procedencia</b><span>'+escapeHtml(L2.procedencia)+'</span></div>';
    if(L2.estado) rows += '<div class="row"><b>Estado</b><span>'+escapeHtml(L2.estado)+'</span></div>';
    var hist = L2.nota?'<div class="historial">'+escapeHtml(L2.nota)+'</div>':'';
    d.innerHTML = rows + hist;
    d.dataset.loaded='1';
  });
}

// ==================== MODAL PARTE ====================

  if(!L) return;
  PARTE_ACTUAL = {id_asignacion:idAsig, lead:L, resultado:null};
  renderParte();
  document.getElementById('modalParte').classList.add('open');
}
function cerrarParte(){ document.getElementById('modalParte').classList.remove('open'); PARTE_ACTUAL = {id_asignacion:null, resultado:null, lead:null}; }

      '<option value="E7">E7 · Quiere contratar</option>'+
      '<option value="E9">E9 · Basura</option>'+
    '</select>'+

function elegirResultado(r, btn){
  PARTE_ACTUAL.resultado = r;
  Array.prototype.forEach.call(document.querySelectorAll('.res-btn'), function(b){b.classList.remove('sel','sel-ok');});
  btn.classList.add(r==='cogio' ? 'sel-ok' : 'sel');
}
document.addEventListener('change', function(e){
  if(e.target && e.target.id==='pEstado'){
    document.getElementById('visitaBox').style.display = (e.target.value==='E5')?'block':'none';
  }
});

function enviarParte(){
  var err = document.getElementById('parteErr'); err.textContent='';
  if(!PARTE_ACTUAL.resultado){err.textContent='Marca primero qué pasó al llamar.';return;}
  var btn = document.getElementById('parteEnviar');
  btn.disabled=true;btn.textContent='Enviando…';

  var proxFecha = document.getElementById('pProxFecha').value;
  var proxHora = document.getElementById('pProxHora').value;
  var proxTipo = proxFecha ? 'llamada' : '';
  var proxNota = document.getElementById('pProxNota').value.trim();
  var sugWa = document.getElementById('pSugWa').checked ? 'true' : 'false';
  var textoWa = document.getElementById('pTextoWa').value.trim();

  var params = {
    action: 'enviar_parte',
    id_asignacion: PARTE_ACTUAL.id_asignacion,
    id_entrenador: SESSION.id,
    pin: SESSION.pin || '',
    resultado: PARTE_ACTUAL.resultado,
    nota_entrenador: document.getElementById('pNota').value.trim(),
    propuesta_estado: document.getElementById('pEstado').value,
    propuesta_prox_fecha: proxFecha,
    propuesta_prox_hora: proxHora,
    propuesta_prox_tipo: proxTipo,
    propuesta_prox_nota: proxNota,
    propuesta_visita_fecha: document.getElementById('pVisitaFecha').value,
    propuesta_visita_hora: document.getElementById('pVisitaHora').value,
    sugerir_wa: sugWa,
    texto_wa: textoWa
  };

  jsonp(params, function(r){
    btn.disabled=false;btn.textContent='Enviar parte a Jon';
    if(r && r.ok){
      document.getElementById('modalParteBody').innerHTML =
        '<div class="ok-msg"><div class="check">✓</div><h3>Parte enviado</h3><p>Jon lo revisará y actualizará la ficha del lead. Gracias.</p></div>'+
        '<button class="btn-enviar" onclick="cerrarParte();cargarLeads(true)">Cerrar</button>';
    } else {
      err.textContent = (r && r.error) ? ('Error: '+r.error) : 'No se ha podido enviar. Inténtalo de nuevo.';
    }
  });
}

(function init(){
  var s = loadSession();
  var m = location.search.match(/[?&]entrenador=([^&]+)/);
  if(m){
    var idQ = decodeURIComponent(m[1]);
    jsonp({action:'entrenadores'}, function(r){
      var ents = (r && r.ok && r.entrenadores) ? r.entrenadores : [];
      var e = ents.filter(function(x){return x.id===idQ;})[0];
      if(e){ entrarComo(e); return; }
      if(s && s.id){ SESSION = s; mostrarBandeja(); var c=_cacheLeer(); if(c && c.leads && c.leads.length){LEADS=c.leads;renderBandeja();} else cargarLeads(); }
      else { document.getElementById('vLogin').style.display='block'; cargarBotonesLogin(); }
    });
    return;
  }
  if(s && s.id){
    SESSION = s;
    mostrarBandeja();
    var cache = _cacheLeer();
    if(cache && cache.leads && cache.leads.length){
      LEADS = cache.leads;
      renderBandeja();
    } else {
      cargarLeads();
    }
  } else {
    document.getElementById('vLogin').style.display='block';
    cargarBotonesLogin();
  }
})();
